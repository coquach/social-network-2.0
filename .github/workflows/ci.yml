name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - apps/**
      - packages/**
      - package.json
      - package-lock.json
      - turbo.json
      - tsconfig.json
      - .github/workflows/**
  push:
    branches:
      - develop
      - main
    paths:
      - apps/**
      - packages/**
      - package.json
      - package-lock.json
      - turbo.json
      - tsconfig.json
      - .github/workflows/**

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed web environment
        run: |
          if [ ! -f apps/web/.env ]; then
            cp apps/web/.env.example apps/web/.env
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed web environment
        run: |
          if [ ! -f apps/web/.env ]; then
            cp apps/web/.env.example apps/web/.env
          fi

      - name: Build workspaces
        run: npm run build
