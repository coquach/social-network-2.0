name: Native Production Release

on:
  push:
    tags:
      - v*
    paths:
      - apps/native/**
      - packages/shared/**
      - packages/ui/**
      - package.json
      - package-lock.json
      - !**/*.md

jobs:
  build_android:
    name: Build Android Production
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS Production
    type: build
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android
    needs:
      - build_android
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Submit iOS
    needs:
      - build_ios
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
